<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sana Puzzle Game Deluxe</title>
<style>
body{
 margin:0;
 font-family:"Yu Gothic",sans-serif;
 background:linear-gradient(#ffe8f5,#e8f4ff);
 display:flex;
 flex-direction:column;
 align-items:center;
}

header{
 font-size:24px;
 font-weight:bold;
 padding:15px;
 color:#ff5fb2;
}

#hud{
 display:flex;
 gap:20px;
 font-size:18px;
 margin-bottom:10px;
}

#game{
 display:grid;
 grid-template-columns:repeat(6,50px);
 grid-gap:6px;
 background:white;
 padding:10px;
 border-radius:15px;
 box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.cell{
 width:50px;
 height:50px;
 border-radius:10px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:24px;
 cursor:pointer;
 user-select:none;
 transition:transform .15s, opacity .25s;
}

.cell:active{ transform:scale(0.9); }

.pop{
 transform:scale(1.4);
 opacity:0;
}

#controls{ margin-top:15px; }

button{
 padding:10px 18px;
 border:none;
 border-radius:20px;
 background:#ff7fcb;
 color:white;
 font-size:14px;
 cursor:pointer;
}

#message{
 margin-top:10px;
 font-size:18px;
 font-weight:bold;
 color:#ff4fb2;
 min-height:24px;
}

footer{
 margin-top:20px;
 font-size:12px;
 color:#666;
}
</style>
</head>

<body>

<header>🧩 Fruits Puzzle Deluxe</header>

<div id="hud">
<div>スコア: <span id="score">0</span></div>
<div>コンボ: <span id="combo">0</span></div>
<div>残り時間: <span id="time">60</span></div>
</div>

<div id="game"></div>

<div id="controls">
<button onclick="resetGame()">リスタート</button>
</div>

<div id="message"></div>

<footer>同じブロックをまとめて消してハイスコアを狙おう！</footer>

<script>

const icons=["🍓","🍋","🍇","🍒","🍊","🫐"]
const size=6
let grid=[]
let score=0
let combo=0
let time=60
let timer=null

const game=document.getElementById("game")
const scoreEl=document.getElementById("score")
const comboEl=document.getElementById("combo")
const timeEl=document.getElementById("time")
const message=document.getElementById("message")

const popSound=new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQgAAAAA")

function randomIcon(){
 return icons[Math.floor(Math.random()*icons.length)]
}

function createGrid(){
 grid=[]
 for(let y=0;y<size;y++){
  let row=[]
  for(let x=0;x<size;x++){
   row.push(randomIcon())
  }
  grid.push(row)
 }
}

function draw(){
 game.innerHTML=""

 for(let y=0;y<size;y++){
  for(let x=0;x<size;x++){

   const cell=document.createElement("div")
   cell.className="cell"
   cell.textContent=grid[y][x]

   cell.onclick=()=>clickCell(x,y,cell)

   game.appendChild(cell)
  }
 }
}

function getGroup(x,y,icon,visited){
 const key=x+","+y
 if(visited.has(key))return []
 if(x<0||y<0||x>=size||y>=size)return []
 if(grid[y][x]!==icon)return []

 visited.add(key)

 let cells=[[x,y]]

 cells=cells.concat(getGroup(x+1,y,icon,visited))
 cells=cells.concat(getGroup(x-1,y,icon,visited))
 cells=cells.concat(getGroup(x,y+1,icon,visited))
 cells=cells.concat(getGroup(x,y-1,icon,visited))

 return cells
}

function clickCell(x,y,element){
 if(time<=0)return

 const icon=grid[y][x]
 const group=getGroup(x,y,icon,new Set())

 if(group.length<2){
  combo=0
  comboEl.textContent=combo
  message.textContent="2個以上つながったブロックをタップ！"
  return
 }

 popSound.currentTime=0
 popSound.play()

 combo++
 comboEl.textContent=combo

 group.forEach(c=>{
  const [gx,gy]=c
  grid[gy][gx]=null
 })

 const gained=group.length*10*combo
 score+=gained
 scoreEl.textContent=score

 animateRemoval(group)
}

function animateRemoval(group){
 const cells=[...game.children]

 group.forEach(c=>{
  const index=c[1]*size+c[0]
  cells[index].classList.add("pop")
 })

 setTimeout(()=>{
  drop()
  refill()
  draw()

  message.textContent=group.length+"消し！ +"+(group.length*10*combo)+"点"
 },250)
}

function drop(){
 for(let x=0;x<size;x++){
  for(let y=size-1;y>=0;y--){

   if(grid[y][x]==null){

    for(let k=y-1;k>=0;k--){

     if(grid[k][x]!=null){
      grid[y][x]=grid[k][x]
      grid[k][x]=null
      break
     }

    }

   }

  }
 }
}

function refill(){
 for(let y=0;y<size;y++){
  for(let x=0;x<size;x++){
   if(grid[y][x]==null){
    grid[y][x]=randomIcon()
   }
  }
 }
}

function startTimer(){
 clearInterval(timer)
 timer=setInterval(()=>{
  time--
  timeEl.textContent=time

  if(time<=0){
   clearInterval(timer)
   message.textContent="ゲーム終了！ スコア: "+score
  }

 },1000)
}

function resetGame(){
 score=0
 combo=0
 time=60
 scoreEl.textContent=score
 comboEl.textContent=combo
 timeEl.textContent=time
 message.textContent=""

 createGrid()
 draw()
 startTimer()
}

createGrid()
draw()
startTimer()

</script>

</body>
</html>
