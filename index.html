<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sana Puzzle Game</title>
<style>
body{
 margin:0;
 font-family:"Yu Gothic",sans-serif;
 background:linear-gradient(#ffe8f5,#e8f4ff);
 display:flex;
 flex-direction:column;
 align-items:center;
}

header{
 font-size:24px;
 font-weight:bold;
 padding:15px;
 color:#ff5fb2;
}

#scoreBoard{
 font-size:18px;
 margin-bottom:10px;
}

#game{
 display:grid;
 grid-template-columns:repeat(6,50px);
 grid-gap:6px;
 background:white;
 padding:10px;
 border-radius:15px;
 box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.cell{
 width:50px;
 height:50px;
 border-radius:10px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:24px;
 cursor:pointer;
 user-select:none;
 transition:transform .1s;
}

.cell:active{
 transform:scale(0.9);
}

#controls{
 margin-top:15px;
}

button{
 padding:10px 18px;
 border:none;
 border-radius:20px;
 background:#ff7fcb;
 color:white;
 font-size:14px;
 cursor:pointer;
}

#message{
 margin-top:10px;
 font-size:16px;
}

footer{
 margin-top:20px;
 font-size:12px;
 color:#666;
}
</style>
</head>

<body>

<header>🧩 Sana Puzzle</header>

<div id="scoreBoard">スコア: <span id="score">0</span></div>

<div id="game"></div>

<div id="controls">
<button onclick="resetGame()">リスタート</button>
</div>

<div id="message"></div>

<footer>Tap blocks to clear groups!</footer>

<script>

const icons=["🍓","🍋","🍇","🍒","🍊","🫐"]
const size=6
let grid=[]
let score=0

const game=document.getElementById("game")
const scoreEl=document.getElementById("score")
const message=document.getElementById("message")

function randomIcon(){
 return icons[Math.floor(Math.random()*icons.length)]
}

function createGrid(){
 grid=[]
 for(let y=0;y<size;y++){
  let row=[]
  for(let x=0;x<size;x++){
   row.push(randomIcon())
  }
  grid.push(row)
 }
}

function draw(){
 game.innerHTML=""

 for(let y=0;y<size;y++){
  for(let x=0;x<size;x++){

   const cell=document.createElement("div")
   cell.className="cell"
   cell.textContent=grid[y][x]

   cell.onclick=()=>clickCell(x,y)

   game.appendChild(cell)
  }
 }
}

function getGroup(x,y,icon,visited){
 const key=x+","+y
 if(visited.has(key))return []
 if(x<0||y<0||x>=size||y>=size)return []
 if(grid[y][x]!==icon)return []

 visited.add(key)

 let cells=[[x,y]]

 cells=cells.concat(getGroup(x+1,y,icon,visited))
 cells=cells.concat(getGroup(x-1,y,icon,visited))
 cells=cells.concat(getGroup(x,y+1,icon,visited))
 cells=cells.concat(getGroup(x,y-1,icon,visited))

 return cells
}

function clickCell(x,y){
 const icon=grid[y][x]
 const group=getGroup(x,y,icon,new Set())

 if(group.length<2){
  message.textContent="2個以上つながったブロックをタップ！"
  return
 }

 group.forEach(c=>{
  const [gx,gy]=c
  grid[gy][gx]=null
 })

 score+=group.length*10
 scoreEl.textContent=score

 drop()
 refill()
 draw()

 message.textContent=""+group.length+"コンボ！"
}

function drop(){
 for(let x=0;x<size;x++){
  for(let y=size-1;y>=0;y--){

   if(grid[y][x]==null){

    for(let k=y-1;k>=0;k--){

     if(grid[k][x]!=null){
      grid[y][x]=grid[k][x]
      grid[k][x]=null
      break
     }

    }

   }

  }
 }
}

function refill(){
 for(let y=0;y<size;y++){
  for(let x=0;x<size;x++){
   if(grid[y][x]==null){
    grid[y][x]=randomIcon()
   }
  }
 }
}

function resetGame(){
 score=0
 scoreEl.textContent=score
 message.textContent=""
 createGrid()
 draw()
}

createGrid()
draw()

</script>

</body>
</html>
